[project]
name = "opf-privacy-filter-onnx"
version = "0.1.0"
description = "PII detection and redaction via ONNX Runtime (cross-platform)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "onnxruntime",
    "transformers",
    "numpy",
    "pyinstaller",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opf_common", "opf_onnx"]
